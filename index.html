<script>
// === YOUR ORIGINAL JS (catalysts, chain, fusions, channels, scroll reveal) — kept 100% ===

// === 3D PARTICLE SWARM (vanilla Three.js — exactly your React code ported) ===
const canvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 120;

const count = 20000;
const geometry = new THREE.TetrahedronGeometry(0.25, 0);
const material = new THREE.MeshBasicMaterial({ color: 0x00ff88, transparent: true, opacity: 0.6 });
const mesh = new THREE.InstancedMesh(geometry, material, count);

const dummy = new THREE.Object3D();
const positions = [];
for (let i = 0; i < count; i++) {
  positions.push(new THREE.Vector3((Math.random()-0.5)*100, (Math.random()-0.5)*100, (Math.random()-0.5)*100));
}
scene.add(mesh);

let time = 0;
function animate3D() {
  time += 0.003;
  const r = 35;

  for (let i = 0; i < count; i++) {
    const phi = Math.acos(-1 + (2 * i) / count);
    const theta = Math.sqrt(count * Math.PI) * phi;
    const x = r * Math.cos(theta) * Math.sin(phi);
    const y = r * Math.sin(theta) * Math.sin(phi);
    const z = r * Math.cos(phi) + Math.sin(time * 0.8 + i) * 8;

    dummy.position.set(x, y, z);
    dummy.updateMatrix();
    mesh.setMatrixAt(i, dummy.matrix);
  }
  mesh.instanceMatrix.needsUpdate = true;

  renderer.render(scene, camera);
  requestAnimationFrame(animate3D);
}
animate3D();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// === SIGN-UP + ANALYTICS ===
function showSignup() { document.getElementById('signupModal').style.display = 'flex'; }
function hideSignup() { document.getElementById('signupModal').style.display = 'none'; }

    alert('Thank you. You are now part of the Resonance.\nTest APK notifications enabled.');
    hideSignup();
    // In production you can POST to Formspree / your own endpoint here
  }
}
